services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      App__BaseUrl: http://localhost:5173
    ports:
      - "5000:8080"
    volumes:
      - backend-uploads:/app/uploads
    restart: unless-stopped

volumes:
  backend-uploads:
